services:
  worker:
    build:
      context: .
      args:
        AUTOMACAO: ${AUTOMACAO}
        PYTHON_VERSION: ${PYTHON_VERSION}
        CELERY_QUEUE: ${CELERY_QUEUE}
        CONCORRENCIA: ${CONCORRENCIA}
    container_name: worker_${AUTOMACAO}
    env_file:
      - stack.env

    restart: unless-stopped

    networks:
      - automacoes

networks:
  automacoes:
